services:
  db:
    image: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clubdb
    volumes:
      - ./bookclub-backend/database.sql:/docker-entrypoint-initdb.d/init.sql

  bookclub-backend:
    container_name: bookclub-backend
    build:
      context: .
      dockerfile: Dockerfile
    image: bookclub-backend
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PASSWORD=password
      - REQUEST_ORIGIN=localhost:3003
    ports:
      - "13000:3003"
    depends_on:
      - db
