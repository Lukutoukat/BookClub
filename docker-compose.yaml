services:
  db:
    image: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clubdb

  bookclub-backend:
    image: bookclub-backend
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PASSWORD=password
      - REQUEST_ORIGIN=http://localhost:5173
    ports:
      - "13000:3003"
    depends_on:
      - db

  bookclub-frontend:
    image: bookclub-frontend
    ports:
      - 5173:5173