kind: ImageStream
apiVersion: image.openshift.io/v1

metadata:
  name: bookclub
  labels:
    app: bookclub
spec:
  lookupPolicy:
    local: false
  tags:
    - name: staging
      from:
        kind: DockerImage
        name: lukutoukat/bookclub:staging
      importPolicy:
        scheduled: true
      referencePolicy:
        type: Local