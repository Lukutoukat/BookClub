name: Lint

on:
  push:
  pull_request:

jobs:
  lint-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '26'

      - name: Install backend dependencies
        working-directory: bookclub-backend
        run: npm ci

      - name: Lint backend
        working-directory: bookclub-backend
        run: npm run lint

  lint-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '26'

      - name: Install frontend dependencies
        working-directory: bookclub-front
        run: npm ci

      - name: Lint frontend
        working-directory: bookclub-front
        run: npm run lint